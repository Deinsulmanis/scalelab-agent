<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScaleLab AI — Lead Response Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #020D18;
      --navy-2:  #071a2e;
      --navy-3:  #0d2440;
      --cyan:    #00D4FF;
      --cyan-dim: #00a8cc;
      --cyan-glow: rgba(0, 212, 255, 0.15);
      --text:    #e8f4f8;
      --text-muted: #7da8be;
      --border:  rgba(0, 212, 255, 0.18);
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--navy);
      color: var(--text);
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 780px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 24px;
      background: var(--navy-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--cyan-glow);
      border: 1px solid var(--border);
    }

    .logo-wrap svg { width: 24px; height: 24px; }

    .header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.02em;
    }

    .header-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .status-dot {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .status-dot span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Chat area ── */
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-window::-webkit-scrollbar { width: 5px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 88%;
      animation: fadeUp 0.25s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .msg.bot .avatar {
      background: var(--cyan-glow);
      border: 1px solid var(--border);
      color: var(--cyan);
    }

    .msg.user .avatar {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .msg.bot .bubble {
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--cyan);
      color: var(--navy);
      font-weight: 500;
      border-top-right-radius: 4px;
    }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 16px;
    }

    .typing-indicator span {
      display: block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      opacity: 0.4;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Lead summary card ── */
    .lead-card {
      background: var(--navy-2);
      border: 1px solid var(--cyan);
      border-radius: 12px;
      padding: 18px 20px;
      margin-top: 6px;
      font-size: 0.85rem;
    }

    .lead-card h3 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--cyan);
      margin-bottom: 12px;
    }

    .lead-card .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .lead-card .row:last-child { border-bottom: none; }
    .lead-card .label { color: var(--text-muted); }
    .lead-card .value { font-weight: 600; color: var(--text); text-align: right; }

    /* ── Input area ── */
    .input-area {
      padding: 16px 20px 20px;
      background: var(--navy-2);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--navy-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      padding: 11px 15px;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.45;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea:focus { border-color: var(--cyan); }

    button#send-btn {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--cyan);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    button#send-btn:hover:not(:disabled) { background: var(--cyan-dim); }
    button#send-btn:active:not(:disabled) { transform: scale(0.94); }
    button#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    button#send-btn svg { width: 18px; height: 18px; fill: var(--navy); }

    .input-hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      header { padding: 14px 16px; }
      .chat-window { padding: 20px 14px; }
      .input-area { padding: 12px 14px 16px; }
      .msg { max-width: 95%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo-wrap">
      <!-- ScaleLab AI icon (simple circuit/spark motif) -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L14.5 9H22L16 13.5L18.5 20.5L12 16L5.5 20.5L8 13.5L2 9H9.5L12 2Z"
              fill="#00D4FF" opacity="0.9"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>ScaleLab AI</h1>
      <p>Lead Response Agent</p>
    </div>
    <div class="status-dot">
      <span></span>
      Online
    </div>
  </header>

  <!-- Chat window -->
  <div class="chat-window" id="chat-window"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        placeholder="Type your message..."
        rows="1"
      ></textarea>
      <button id="send-btn" title="Send">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Powered by ScaleLab AI &mdash; Responses are AI-generated</div>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────
  //  Backend endpoint — API key lives in .env
  // ─────────────────────────────────────────────
  const API_URL = "https://scalelab-agent-production.up.railway.app/api/chat";

  // ─────────────────────────────────────────────
  //  State
  // ─────────────────────────────────────────────
  const conversationHistory = [];
  let   isLoading           = false;

  // ─────────────────────────────────────────────
  //  DOM helpers
  // ─────────────────────────────────────────────
  const chatWindow = document.getElementById("chat-window");
  const userInput  = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  function scrollToBottom() {
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function appendMessage(role, content, isHtml = false) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "bot" ? "AI" : "You";

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (isHtml) {
      bubble.innerHTML = content;
    } else {
      // Convert newlines to <br> for readability
      bubble.innerHTML = content.replace(/\n/g, "<br>");
    }

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg bot";
    wrap.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `
      <div class="typing-indicator">
        <span></span><span></span><span></span>
      </div>`;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    chatWindow.appendChild(wrap);
    scrollToBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function setLoading(state) {
    isLoading        = state;
    sendBtn.disabled = state;
    userInput.disabled = state;
  }

  // ─────────────────────────────────────────────
  //  Backend API call — no key in the browser
  // ─────────────────────────────────────────────
  async function fetchAI(messages) {
    const response = await fetch(API_URL, {
      method  : "POST",
      headers : { "Content-Type": "application/json" },
      body    : JSON.stringify({ messages })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error || `Server error ${response.status}`);
    }

    const data = await response.json();
    return data.content || "";
  }

  // ─────────────────────────────────────────────
  //  Send message
  // ─────────────────────────────────────────────
  async function sendMessage(text) {
    text = text.trim();
    if (!text || isLoading) return;

    // Show user bubble
    appendMessage("user", text);

    // Add to history
    conversationHistory.push({ role: "user", content: text });

    // Clear input
    userInput.value = "";
    autoResize();

    // Fetch AI reply
    setLoading(true);
    showTyping();

    try {
      const reply = await fetchAI(conversationHistory);
      removeTyping();

      conversationHistory.push({ role: "assistant", content: reply });
      appendMessage("bot", reply);

      // Detect completion and show lead card
      maybeShowLeadCard(reply);

    } catch (err) {
      removeTyping();
      appendMessage("bot", `Sorry, something went wrong. Please try again.\n\n_Error: ${err.message}_`);
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }

  // ─────────────────────────────────────────────
  //  Lead summary card (appears when lead is complete)
  // ─────────────────────────────────────────────
  function maybeShowLeadCard(botReply) {
    // Heuristic: if the bot message contains a summary and confirmation language
    const lowerReply = botReply.toLowerCase();
    const isComplete =
      (lowerReply.includes("team member") || lowerReply.includes("in touch") || lowerReply.includes("reach out")) &&
      (lowerReply.includes("thank") || lowerReply.includes("great") || lowerReply.includes("perfect"));

    if (!isComplete) return;

    // Extract fields from conversation
    const lead = extractLeadData();
    if (!lead) return;

    // Build card HTML
    const cardHtml = `
      <div class="lead-card">
        <h3>Lead Captured</h3>
        ${lead.name      ? `<div class="row"><span class="label">Name</span><span class="value">${escHtml(lead.name)}</span></div>` : ""}
        ${lead.phone     ? `<div class="row"><span class="label">Phone</span><span class="value">${escHtml(lead.phone)}</span></div>` : ""}
        ${lead.jobType   ? `<div class="row"><span class="label">Job Type</span><span class="value">${escHtml(lead.jobType)}</span></div>` : ""}
        ${lead.location  ? `<div class="row"><span class="label">Location</span><span class="value">${escHtml(lead.location)}</span></div>` : ""}
        ${lead.timeline  ? `<div class="row"><span class="label">Timeline</span><span class="value">${escHtml(lead.timeline)}</span></div>` : ""}
      </div>`;

    const wrap = document.createElement("div");
    wrap.innerHTML = cardHtml;
    chatWindow.appendChild(wrap.firstElementChild);
    scrollToBottom();
  }

  function extractLeadData() {
    // Scan assistant messages for keywords to reconstruct the lead
    const full = conversationHistory
      .filter(m => m.role === "assistant")
      .map(m => m.content)
      .join("\n")
      .toLowerCase();

    // We rely on the bot's own summary for display — return a flag object
    return full.length > 0 ? { extracted: true } : null;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  // ─────────────────────────────────────────────
  //  Auto-resize textarea
  // ─────────────────────────────────────────────
  function autoResize() {
    userInput.style.height = "auto";
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
  }

  userInput.addEventListener("input", autoResize);

  userInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage(userInput.value);
    }
  });

  sendBtn.addEventListener("click", () => sendMessage(userInput.value));

  // ─────────────────────────────────────────────
  //  Boot — send initial greeting from AI
  // ─────────────────────────────────────────────
  async function init() {
    setLoading(true);
    showTyping();
    try {
      // Kick off with an empty user turn so the AI opens the conversation
      const opener = await fetchAI([{
        role: "user",
        content: "[System: The customer has just opened the chat. Begin by greeting them and asking your first qualifying question.]"
      }]);
      removeTyping();
      conversationHistory.push({ role: "assistant", content: opener });
      appendMessage("bot", opener);
    } catch (err) {
      removeTyping();
      appendMessage("bot", "Hi! Thanks for reaching out to ScaleLab AI. What type of service are you looking for today — plumbing, electrical, or HVAC?");
    } finally {
      setLoading(false);
      userInput.focus();
    }
  }

  init();
</script>
</body>
</html>
